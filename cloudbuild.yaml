# GCP Cloud Build — CI/CD pipeline para Firebase Functions
# Triggered on push to main branch
#
# Prerequisites:
#   - Secret Manager secrets: DATABASE_URL, JWT_SECRET, GMAIL_USER, GMAIL_PASSWORD
#   - Cloud Build service account with roles:
#       secretmanager.secretAccessor, iam.serviceAccountUser
#   - Firebase project: osiris-api
#   - Service Account Key JSON stored in Secret Manager as FIREBASE_SA_KEY

steps:
  # 1. Install dependencies (production only)
  - name: 'node:20'
    entrypoint: npm
    args: ['ci', '--omit=dev']

  # 2. Generate Prisma Client
  - name: 'node:20'
    entrypoint: npx
    args: ['prisma', 'generate']
    secretEnv: ['DATABASE_URL']

  # 3. Apply database migrations
  - name: 'node:20'
    entrypoint: npx
    args: ['prisma', 'migrate', 'deploy', '--schema=prisma/schema.prisma']
    secretEnv: ['DATABASE_URL']

  # 4. Apply seeds (optional — does not fail the build if missing)
  - name: 'node:20'
    entrypoint: bash
    args:
      - '-c'
      - |
        if [ -f prisma/seed.js ]; then
          npx prisma db seed
        else
          echo "No seed file found, skipping"
        fi
    secretEnv: ['DATABASE_URL']

  # 5. Install Firebase CLI and deploy functions
  - name: 'node:20'
    entrypoint: bash
    args:
      - '-c'
      - |
        npm install -g firebase-tools

        # Write service account key from secret to temp file
        echo "$$FIREBASE_SA_KEY" > /tmp/firebase-sa.json
        export GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-sa.json

        # Deploy both functions: graphqlHandler + alertaAgendaHandler
        firebase deploy --only functions --non-interactive --project osiris-api

        # Cleanup
        rm -f /tmp/firebase-sa.json

    secretEnv: ['FIREBASE_SA_KEY', 'GMAIL_USER', 'GMAIL_PASSWORD']

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/DATABASE_URL/versions/latest
      env: DATABASE_URL
    - versionName: projects/$PROJECT_ID/secrets/FIREBASE_SA_KEY/versions/latest
      env: FIREBASE_SA_KEY
    - versionName: projects/$PROJECT_ID/secrets/GMAIL_USER/versions/latest
      env: GMAIL_USER
    - versionName: projects/$PROJECT_ID/secrets/GMAIL_PASSWORD/versions/latest
      env: GMAIL_PASSWORD

options:
  logging: CLOUD_LOGGING_ONLY
