name: Deploy Firebase Functions

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build, Migrate & Deploy
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      GMAIL_USER: ${{ secrets.GMAIL_USER }}
      GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
      NODE_ENV: production
      FIREBASE_PROJECT_ID: calculadora-a1d21
      GRAPHQL_ENDPOINT: https://graphqlhandler-bpmfjim7tq-uc.a.run.app/graphql

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --omit=dev --legacy-peer-deps

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Apply migrations
        run: npx prisma migrate deploy --schema=prisma/schema.prisma

      - name: Apply seeds (optional)
        run: npx prisma db seed || echo "No seed or seed failed, continuing"

      - name: Create Functions .env from GitHub Secrets
        run: |
          cat <<EOF > .env
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN=${{ secrets.JWT_EXPIRES_IN }}
          GMAIL_USER=${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD=${{ secrets.GMAIL_PASSWORD }}
          NODE_ENV=production
          EOF

      - name: Deploy to Firebase Functions
        uses: w9jds/firebase-action@master
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        with:
          args: deploy --only functions --non-interactive --force --project ${{ env.FIREBASE_PROJECT_ID }}

      - name: Validate GraphQL schema on production endpoint
        run: |
          node <<'EOF'
          const endpoint = process.env.GRAPHQL_ENDPOINT;
          const expectedField = 'createProtocoloEstruturado';

          async function run() {
            const response = await fetch(endpoint, {
              method: 'POST',
              headers: { 'content-type': 'application/json' },
              body: JSON.stringify({
                query: '{ __type(name: "Mutation") { fields { name } } }',
              }),
            });

            if (!response.ok) {
              throw new Error(`GraphQL introspection failed with HTTP ${response.status}`);
            }

            const payload = await response.json();
            const fields = payload?.data?.__type?.fields;

            if (!Array.isArray(fields)) {
              throw new Error('GraphQL introspection returned an invalid payload');
            }

            const fieldNames = fields.map((field) => field.name);
            if (!fieldNames.includes(expectedField)) {
              throw new Error(`Missing mutation \"${expectedField}\" on endpoint ${endpoint}`);
            }

            console.log(`Validated mutation \"${expectedField}\" on ${endpoint}`);
          }

          run().catch((error) => {
            console.error(error.message);
            process.exit(1);
          });
          EOF
